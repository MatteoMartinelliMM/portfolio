<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <title>Tabella</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
        }
        .container {
            width: 90%; /* Larghezza aumentata */
            margin: auto;
            padding-top: 20px;
        }
        .logo {
            display: flex;
            align-items: center;
        }
        .logo img {
            width: 100px;
            margin-right: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd; /* Bordo per separare le celle */
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #da4d11; /* Colore viola */
            color: #d3d3d3; /* Grigio chiaro */
        }
        td {
            color: #d3d3d3; /* Grigio chiaro */
            height: 30px; /* Altezza per facilitare la scrittura */
        }
        /* Larghezza colonna email aumentata */
        th:nth-child(2), td:nth-child(2) {
            width: 30%; /* Maggiore larghezza per l'email */
        }
        @media print {
            th {
                -webkit-print-color-adjust: exact;
                color-adjust: exact;
                background-color: #da4d11;
                color: #d3d3d3;
            }
        }
    </style>
</head>
